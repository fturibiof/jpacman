name: CodeScene Code Health

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  codescene:
    name: CodeScene Code Health check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # CodeScene needs history to analyze code health

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build and Run Tests with Coverage
      run: xvfb-run ./gradlew test jacocoTestReport
      
    - name: Install CodeScene Coverage Tool
      run: |
        curl -s https://codescene.io/cs-coverage/install.sh | bash
        echo "$HOME/.codescene/bin" >> $GITHUB_PATH

    - name: Upload Coverage to CodeScene
      env:
        CS_ACCESS_TOKEN: ${{ secrets.CODESCENE_ACCESS_TOKEN }}
        # Uncomment and set if you are using an On-Premise/Enterprise version
        # CODESCENE_API_URL: ${{ secrets.CODESCENE_API_URL }}
      run: |
        # Locate the jacoco XML report
        REPORT_PATH=$(find . -name "jacocoTestReport.xml" -type f | head -n 1)
        if [ -f "$REPORT_PATH" ]; then
          echo "Found Jacoco report at $REPORT_PATH"
          cs-coverage upload --format jacoco "$REPORT_PATH"
        else
          echo "No Jacoco XML report found!"
          exit 1
        fi
